<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#ffffff;
      color:#222;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:900px;
      text-align:center;
    }

    .logo{
      width:120px;
      height:120px;
      border-radius:20px;
      object-fit:cover;
      margin-bottom:20px;
    }

    h1{
      font-size:2rem;
      margin-bottom:10px;
    }

    .subtitle{
      color:#666;
      margin-bottom:40px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      border:1px solid #ddd;
      border-radius:20px;
      padding:25px;
      cursor:pointer;
      transition:.2s;
      text-decoration:none;
      color:inherit;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }

    .card h3{
      margin-bottom:10px;
    }

    .footer{
      margin-top:40px;
      color:#999;
      font-size:.9rem;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo" alt="logo">

    <!-- PROFILE -->
    <h1>Your Name</h1>
    <p class="subtitle">
      Your Title / About Yourself
    </p>

    <!-- REDIRECT LINKS -->
    <div class="cards">

      <a href="#" class="card">
        <h3>Portfolio</h3>
        <p>Description here</p>
      </a>

      <a href="#" class="card">
        <h3>GitHub</h3>
        <p>Description here</p>
      </a>

      <a href="#" class="card">
        <h3>Contact</h3>
        <p>Description here</p>
      </a>

      <a href="#" class="card">
        <h3>Projects</h3>
        <p>Description here</p>
      </a>

      <a href="#" class="card">
        <h3>Blog</h3>
        <p>Description here</p>
      </a>

      <a href="#" class="card">
        <h3>Social Media</h3>
        <p>Description here</p>
      </a>

    </div>

    <div class="footer">
      © 2026 Your Name
    </div>

  </div>

</body>
</html>
