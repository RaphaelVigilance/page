<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WIRANAT Coral Life</title>
  <link rel="icon" type="image/x-icon" href="iconcoral.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
    --crimson:  #C0184A;
    --orange:   #D4682A;
    --teal:     #1A9090;
    --olive:    #8A9040;
    --cobalt:   #2A5AAA;

    --dark:     #ffffff;
    --surface:  rgba(255,255,255,0.92);
    --card:     rgba(255,255,255,0.95);

    --border:   rgba(0,0,0,0.06);

    --text:     #1c1c1c;
    --muted:    rgba(0,0,0,0.45);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 44px 20px 64px;
      background: var(--dark);
      overflow-x: hidden;
    }

    .bg {
    position: fixed;
    inset: 0;
    z-index: 0;

    background: url("bg-01.png") center/cover no-repeat;

    opacity: 0.3;
    }

    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 65% 55% at 80% 5%, rgba(192,24,74,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 5% 85%, rgba(212,104,42,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 45% 40% at 55% 65%, rgba(26,144,144,0.04) 0%, transparent 60%);
    }

    .container {
      width: 100%; max-width: 820px;
      position: relative; z-index: 1;
      animation: rise .8s cubic-bezier(.22,.6,.36,1) both;
    }
    @keyframes rise {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px 36px 38px;
      text-align: center;
      backdrop-filter: blur(20px);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg,
        var(--crimson) 0%, var(--orange) 18%, var(--olive) 33%,
        var(--emerald) 48%, var(--teal) 65%, var(--cobalt) 82%, var(--crimson) 100%);
      border-radius: 28px 28px 0 0;
    }

    .logo-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 22px;
    }
    .logo{
    width: 140px;
    height: 140px;

    border-radius: 28px;

    object-fit: cover;
    display: block;

    position: relative;
    z-index: 1;

    border: 2px solid rgba(255,255,255,0.8);

    box-shadow:
        0 0 0 6px rgba(192,24,74,0.06),
        0 0 0 12px rgba(212,104,42,0.03),
        0 14px 35px rgba(0,0,0,0.08);
    }
    .logo-ring{
    position:absolute;
    inset:-12px;

    border-radius: 34px;   /* ให้ตาม logo */

    animation: spin 16s linear infinite;

    background: conic-gradient(
        from 0deg,
        rgba(192,24,74,0.22),
        rgba(212,104,42,0.22),
        rgba(138,144,64,0.20),
        rgba(26,128,64,0.20),
        rgba(26,144,144,0.22),
        rgba(42,90,170,0.22),
        rgba(192,24,74,0.22)
    );

    mask: radial-gradient(
        farthest-side,
        transparent calc(100% - 2px),
        white 100%
    );

    -webkit-mask: radial-gradient(
        farthest-side,
        transparent calc(100% - 2px),
        white 100%
    );
    }


    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500; font-size: 2.1rem;
      letter-spacing: 0.03em; line-height: 1.15;
      margin-bottom: 6px;
    }
    h1 span { color: var(--crimson); }

    .divider {
      width:40px; height:1px;
      background: linear-gradient(90deg, var(--crimson), var(--teal));
      margin: 16px auto; opacity: 0.65;
    }
    .subtitle {
      font-size: 0.71rem; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--muted); font-weight: 400;
    }

    /* ── GRID ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    /* ── CARD ── */
    .card {
    background: rgba(255,255,255,0.95);
    border: 1px solid rgba(0,0,0,0.06);

    border-radius: 18px;
    padding: 20px 20px 18px;

    backdrop-filter: blur(16px);

    text-decoration: none;
    color: var(--text);

    display: flex;
    align-items: flex-start;
    gap: 14px;

    transition:
        transform .22s ease,
        border-color .22s ease,
        box-shadow .22s ease;

    animation: rise .8s cubic-bezier(.22,.6,.36,1) both;

    position: relative;
    overflow: hidden;

    box-shadow:
        0 8px 30px rgba(0,0,0,0.04);
    }
    .card[data-a="crimson"] { --a: var(--crimson); }
    .card[data-a="orange"]  { --a: var(--orange);  }
    .card[data-a="teal"]    { --a: var(--teal);    }
    .card[data-a="cobalt"]  { --a: var(--cobalt);  }
    .card[data-a="olive"]   { --a: var(--olive);   }

    .card::before {
      content: ''; position: absolute;
      left:0; top:0; bottom:0; width:2px;
      background: var(--a);
      border-radius: 18px 0 0 18px;
      opacity: 0.55;
      transition: opacity .22s, width .22s;
    }
    .card:hover{
    transform: translateY(-4px);

    border-color: rgba(0,0,0,0.08);

    box-shadow:
        0 14px 35px rgba(0,0,0,0.08);
    }

    .card:hover::before{
    width:3px;
    opacity:1;
    }

    .card:hover .icon-wrap{
    background: color-mix(in srgb, var(--a) 8%, white);
    border-color: color-mix(in srgb, var(--a) 18%, white);
    }

    .card:hover .icon-wrap svg{
    stroke: var(--a);
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.08));
    }

    .card:nth-child(1){animation-delay:.10s;}
    .card:nth-child(2){animation-delay:.16s;}
    .card:nth-child(3){animation-delay:.22s;}
    .card:nth-child(4){animation-delay:.28s;}
    .card:nth-child(5){animation-delay:.34s;}

    .icon-wrap {
      flex-shrink:0; width:40px; height:40px; border-radius:11px;
      border:1px solid rgba(255,255,255,0.07);
      background:rgba(255,255,255,0.04);
      display:flex; align-items:center; justify-content:center;
      transition: background .22s, border-color .22s;
    }
    .icon-wrap svg {
      width:17px; height:17px; fill:none;
      stroke: var(--muted); stroke-width:1.6;
      stroke-linecap:round; stroke-linejoin:round;
      transition: stroke .22s, filter .22s;
    }

    .card-body { flex:1; min-width:0; }
    .card h3 {
      font-size:0.59rem; letter-spacing:0.13em;
      text-transform:uppercase; color:var(--muted);
      margin-bottom:5px; font-weight:500;
    }
    .card p { font-size:0.86rem; line-height:1.46; color:var(--text); word-break:break-word; }

    .location-card { grid-column: span 2; }

    .footer {
      margin-top:24px; text-align:center;
      font-size:0.71rem; color:var(--muted); letter-spacing:0.06em;
    }

    @media (max-width:600px) {
      body { padding:24px 14px 48px; }
      .logo{
        width:130px;
        height:130px;
        }
      .hero { padding:34px 20px 28px; border-radius:22px; }
      h1 { font-size:1.5rem; }
      .cards { grid-template-columns:1fr; gap:10px; }
      .location-card { grid-column:span 1; }
      .card { border-radius:14px; padding:16px; }
    }
  </style>
</head>
